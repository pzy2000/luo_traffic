<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Routing Debug</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, "Microsoft YaHei", system-ui, sans-serif; background: #12151c; color: #e7ebf2; }
    body { display: grid; grid-template-columns: minmax(720px, 1fr) 390px; }
    #stage { position: relative; min-width: 0; min-height: 0; background: #f5f6f8; }
    #map { width: 100%; height: 100%; display: block; cursor: crosshair; }
    #hud { position: absolute; top: 12px; left: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 8px; border: 1px solid rgba(255,255,255,.14); border-radius: 6px; background: rgba(18,21,28,.9); box-shadow: 0 10px 28px rgba(0,0,0,.18); }
    button, select, label.toggle { height: 30px; border: 1px solid #3d4656; border-radius: 4px; background: #1d232e; color: #f3f6fb; font: inherit; padding: 0 9px; }
    button { cursor: pointer; }
    button.active { background: #2f6fed; border-color: #4d85ff; }
    label.toggle { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
    input[type="checkbox"] { margin: 0; }
    #side { min-width: 0; overflow: auto; padding: 14px; border-left: 1px solid #2b313d; background: #151922; }
    h1 { margin: 0 0 10px; font-size: 18px; line-height: 1.2; }
    h2 { margin: 18px 0 8px; font-size: 13px; color: #aeb8c7; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .stat { min-height: 54px; padding: 8px; border: 1px solid #303746; border-radius: 6px; background: #1d222c; }
    .stat b { display: block; font-size: 18px; color: #fff; line-height: 1.15; }
    .stat span { display: block; margin-top: 4px; color: #98a4b5; font-size: 12px; }
    .panel { border: 1px solid #303746; border-radius: 6px; background: #1b2029; padding: 9px; }
    .details { font-size: 12px; line-height: 1.55; color: #c9d2df; white-space: pre-wrap; word-break: break-word; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; font-size: 12px; color: #c7cfda; }
    .key { display: inline-block; width: 22px; height: 3px; margin-right: 7px; border-radius: 2px; vertical-align: middle; }
    .dot { display: inline-block; width: 9px; height: 9px; margin-right: 7px; border-radius: 50%; vertical-align: -1px; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 12px; }
    th, td { padding: 6px 4px; border-bottom: 1px solid #2a303b; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    th { color: #98a4b5; font-weight: 600; }
    tr { cursor: pointer; }
    tr:hover { background: #232936; }
    tr.selected { background: #26395c; }
    .issue { color: #ff6b6b; font-weight: 700; }
    .warn { color: #ffb84d; font-weight: 700; }
    .ok { color: #72d58a; font-weight: 700; }
    #events { max-height: 220px; overflow: auto; font-size: 12px; color: #cad2de; line-height: 1.45; }
    .event { padding: 5px 0; border-bottom: 1px solid #2a303b; }
    .event b { color: #fff; }
    .muted { color: #8e99aa; }
    @media (max-width: 1100px) { body { grid-template-columns: 1fr; grid-template-rows: minmax(520px, 1fr) 360px; } #side { border-left: 0; border-top: 1px solid #2b313d; } }
  </style>
</head>
<body>
  <main id="stage">
    <canvas id="map"></canvas>
    <div id="hud">
      <button id="pauseBtn">暂停</button>
      <button id="resetBtn">重置</button>
      <button id="fitBtn">适配</button>
      <select id="speedSelect">
        <option value="1" selected>1x</option>
        <option value="4">4x</option>
        <option value="8">8x</option>
        <option value="16">16x</option>
        <option value="32">32x</option>
        <option value="64">64x</option>
      </select>
      <label class="toggle"><input id="showConnectors" type="checkbox" />短连接</label>
      <label class="toggle"><input id="showDeadEnds" type="checkbox" />死路点</label>
      <label class="toggle"><input id="showRouteGraph" type="checkbox" />路由图</label>
      <label class="toggle"><input id="showExcludedRoads" type="checkbox" />未入图道路</label>
      <label class="toggle"><input id="showNearMisses" type="checkbox" />错位端点</label>
      <label class="toggle"><input id="showSmallComponents" type="checkbox" />小片区</label>
      <label class="toggle"><input id="showTrails" type="checkbox" checked />轨迹</label>
      <label class="toggle"><input id="showPlans" type="checkbox" checked />规划线</label>
      <label class="toggle"><input id="boundaryRespawn" type="checkbox" />边界重生</label>
      <label class="toggle"><input id="deadEndRespawn" type="checkbox" />死路重生</label>
    </div>
  </main>
  <aside id="side">
    <h1>交通路由调试</h1>
    <div class="stats" id="stats"></div>

    <h2>图例</h2>
    <div class="legend">
      <div><span class="key" style="background:#202734"></span>真实道路</div>
      <div><span class="key" style="background:#00a6a6"></span>路由图边</div>
      <div><span class="key" style="background:#7c3aed"></span>未入图道路</div>
      <div><span class="key" style="background:#f28c28"></span>短连接</div>
      <div><span class="dot" style="background:#f04444"></span>死路节点</div>
      <div><span class="dot" style="background:#0ea5e9"></span>未入图端点</div>
      <div><span class="dot" style="background:#6b5cff"></span>小连通片区</div>
      <div><span class="dot" style="background:#1e9b55"></span>按规划行驶</div>
      <div><span class="dot" style="background:#e03b3b"></span>疑似小范围循环</div>
    </div>

    <h2>选中对象</h2>
    <div class="panel details" id="selection">加载中...</div>

    <h2>问题车辆</h2>
    <div class="panel" style="padding:0; overflow:hidden;">
      <table>
        <thead><tr><th style="width:58px;">车辆</th><th style="width:74px;">状态</th><th>范围/边</th><th style="width:56px;">规划</th></tr></thead>
        <tbody id="vehicleRows"></tbody>
      </table>
    </div>

    <h2>事件</h2>
    <div class="panel" id="events"></div>
  </aside>

  <script src="data/app-data.js"></script>
  <script src="data/route-graph.js"></script>
  <script src="js/traffic-graph.js"></script>
  <script>
    const SCENE_WIDTH = 1600;
    const SCENE_HEIGHT = 900;
    const canvas = document.getElementById("map");
    const ctx = canvas.getContext("2d");
    const statsEl = document.getElementById("stats");
    const rowsEl = document.getElementById("vehicleRows");
    const eventsEl = document.getElementById("events");
    const selectionEl = document.getElementById("selection");
    const controls = {
      pauseBtn: document.getElementById("pauseBtn"),
      resetBtn: document.getElementById("resetBtn"),
      fitBtn: document.getElementById("fitBtn"),
      speedSelect: document.getElementById("speedSelect"),
      showConnectors: document.getElementById("showConnectors"),
      showDeadEnds: document.getElementById("showDeadEnds"),
      showRouteGraph: document.getElementById("showRouteGraph"),
      showExcludedRoads: document.getElementById("showExcludedRoads"),
      showNearMisses: document.getElementById("showNearMisses"),
      showSmallComponents: document.getElementById("showSmallComponents"),
      showTrails: document.getElementById("showTrails"),
      showPlans: document.getElementById("showPlans"),
      boundaryRespawn: document.getElementById("boundaryRespawn"),
      deadEndRespawn: document.getElementById("deadEndRespawn")
    };

    let appData = null;
    let routeTemplates = [];
    let roadLookup = new Map();
    let rng = createSeededRng(20260410);
    let routeLibrary = null;
    let vehicles = [];
    let selectedVehicleId = null;
    let paused = false;
    let simTime = 1000;
    let lastFrame = performance.now();
    let lastRoutePlanWallAt = 0;
    let eventLog = [];
    const forwardPathCache = new Map();
    let roadBounds = { minX: 0, minY: 0, maxX: SCENE_WIDTH, maxY: SCENE_HEIGHT };
    let pointerDown = null;
    const issueCounts = { loop: 0, deadEnd: 0, boundaryRespawn: 0, deadEndRespawn: 0, loopRespawn: 0, uturn: 0, escape: 0 };
    const view = { scale: 1, x: 0, y: 0 };

    init().catch((error) => {
      selectionEl.textContent = "调试页初始化失败: " + error.message;
      console.error(error);
    });

    async function init() {
      selectionEl.textContent = "初始化: 读取数据";
      appData = window.appData;
      routeTemplates = window.routeTemplates;
      if (!appData || !routeTemplates) {
        throw new Error("missing data/app-data.js");
      }
      roadLookup = new Map(appData.roads.map((road) => [road.id, road]));
      roadBounds = getRoadBounds(appData.roads);
      selectionEl.textContent = "初始化: 加载持久化路由图";
      routeLibrary = createRouteLibrary();
      selectionEl.textContent = "初始化: 创建车辆";
      vehicles = createVehicles();
      selectedVehicleId = vehicles[0] ? vehicles[0].id : null;
      wireControls();
      resetView();
      resizeCanvas();
      logEvent("ready", "已读取 data/app-data.js 和 data/route-graph.js 当前地图数据");
      selectionEl.textContent = "初始化: 首帧渲染";
      render();
      updateSidebar();
      requestAnimationFrame(frame);
    }

    function extractConst(source, name) {
      const marker = "const " + name + " = ";
      const start = source.indexOf(marker);
      if (start < 0) {
        throw new Error("missing const " + name);
      }
      let index = start + marker.length;
      const expressionStart = index;
      let depth = 0;
      let quote = null;
      let escape = false;
      for (; index < source.length; index += 1) {
        const char = source[index];
        if (quote) {
          if (escape) {
            escape = false;
          } else if (char === "\\") {
            escape = true;
          } else if (char === quote) {
            quote = null;
          }
          continue;
        }
        if (char === "\"" || char === "'" || char === "`") {
          quote = char;
          continue;
        }
        if (char === "{" || char === "[" || char === "(") depth += 1;
        if (char === "}" || char === "]" || char === ")") depth -= 1;
        if (char === ";" && depth === 0) {
          return source.slice(expressionStart, index).trim();
        }
      }
      throw new Error("unterminated const " + name);
    }

    function wireControls() {
      window.addEventListener("resize", resizeCanvas);
      controls.pauseBtn.addEventListener("click", () => {
        paused = !paused;
        controls.pauseBtn.textContent = paused ? "继续" : "暂停";
        controls.pauseBtn.classList.toggle("active", paused);
      });
      controls.resetBtn.addEventListener("click", resetSimulation);
      controls.fitBtn.addEventListener("click", () => {
        resetView();
        render();
      });
      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const sx = event.clientX - rect.left;
        const sy = event.clientY - rect.top;
        const before = screenToWorld(sx, sy);
        view.scale = clamp(view.scale * (event.deltaY < 0 ? 1.16 : 0.86), 0.35, 12);
        view.x = sx - before.x * view.scale;
        view.y = sy - before.y * view.scale;
        render();
      }, { passive: false });
      canvas.addEventListener("mousedown", (event) => {
        pointerDown = { x: event.clientX, y: event.clientY, viewX: view.x, viewY: view.y, moved: false };
      });
      window.addEventListener("mousemove", (event) => {
        if (!pointerDown) return;
        const dx = event.clientX - pointerDown.x;
        const dy = event.clientY - pointerDown.y;
        if (Math.abs(dx) + Math.abs(dy) > 3) pointerDown.moved = true;
        view.x = pointerDown.viewX + dx;
        view.y = pointerDown.viewY + dy;
        render();
      });
      window.addEventListener("mouseup", (event) => {
        if (!pointerDown) return;
        const wasDrag = pointerDown.moved;
        pointerDown = null;
        if (!wasDrag) selectNearestVehicle(event.clientX, event.clientY);
      });
      rowsEl.addEventListener("click", (event) => {
        const row = event.target.closest("tr[data-id]");
        if (!row) return;
        selectedVehicleId = row.dataset.id;
        render();
        updateSidebar();
      });
    }

    function resetSimulation() {
      rng = createSeededRng(20260410);
      routeLibrary = createRouteLibrary();
      vehicles = createVehicles();
      selectedVehicleId = vehicles[0] ? vehicles[0].id : null;
      simTime = 1000;
      eventLog = [];
      Object.keys(issueCounts).forEach((key) => { issueCounts[key] = 0; });
      logEvent("reset", "模拟已重置");
      render();
      updateSidebar();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      render();
    }

    function resetView() {
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(720, rect.width || 1000);
      const height = Math.max(500, rect.height || 700);
      const padding = 38;
      const scaleX = (width - padding * 2) / Math.max(1, roadBounds.maxX - roadBounds.minX);
      const scaleY = (height - padding * 2) / Math.max(1, roadBounds.maxY - roadBounds.minY);
      view.scale = Math.min(scaleX, scaleY);
      view.x = (width - (roadBounds.minX + roadBounds.maxX) * view.scale) / 2;
      view.y = (height - (roadBounds.minY + roadBounds.maxY) * view.scale) / 2;
    }

    function frame(now) {
      const elapsed = Math.min(120, now - lastFrame);
      lastFrame = now;
      if (!paused && vehicles.length) {
        const multiplier = Number(controls.speedSelect.value) || 1;
        const totalDt = elapsed / 1000 * multiplier;
        const steps = Math.max(1, Math.min(160, Math.ceil(totalDt / 0.08)));
        const dt = totalDt / steps;
        for (let step = 0; step < steps; step += 1) {
          simTime += dt * 1000;
          vehicles.forEach((vehicle, index) => {
            advanceVehicle(vehicle, dt, simTime, index);
            updateVehicleDiagnostics(vehicle, simTime);
          });
        }
      }
      render();
      updateSidebar();
      requestAnimationFrame(frame);
    }

    function render() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      ctx.fillStyle = "#f5f6f8";
      ctx.fillRect(0, 0, rect.width, rect.height);
      if (!appData || !routeLibrary) return;
      drawDistricts();
      drawRoads();
      if (controls.showExcludedRoads.checked) drawExcludedRoads();
      if (controls.showRouteGraph.checked) drawRouteGraph();
      if (controls.showNearMisses.checked) drawNearMisses();
      if (controls.showSmallComponents.checked) drawSmallComponents();
      if (controls.showDeadEnds.checked) drawDeadEnds();
      if (controls.showConnectors.checked) drawConnectors();
      if (controls.showTrails.checked) drawTrails();
      if (controls.showPlans.checked) drawPlans();
      drawVehicles();
    }

    function drawDistricts() {
      ctx.save();
      appData.districts.forEach((district) => {
        ctx.beginPath();
        district.polygon.forEach((point, index) => {
          const p = worldToScreen(point[0], point[1]);
          if (index === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fillStyle = district.chainId === "zero" ? "rgba(50,130,210,.055)" : district.chainId === "qu" ? "rgba(20,150,100,.052)" : "rgba(210,100,40,.052)";
        ctx.fill();
        ctx.strokeStyle = "rgba(30,40,55,.10)";
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawRoads() {
      ctx.save();
      appData.roads.forEach((road) => {
        if (road.rank < 2 || road.points.length < 2) return;
        ctx.beginPath();
        road.points.forEach((point, index) => {
          const p = worldToScreen(point[0], point[1]);
          if (index === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.lineWidth = Math.max(0.55, (road.rank * 0.26 + 0.35) * Math.sqrt(view.scale));
        ctx.strokeStyle = road.rank >= 8 ? "#151a23" : road.rank >= 6 ? "#303846" : road.rank >= 4 ? "#697382" : "#b6bec9";
        ctx.globalAlpha = road.rank >= 6 ? 0.86 : 0.55;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawExcludedRoads() {
      ctx.save();
      appData.roads.forEach((road) => {
        if (!isDrawnRoad(road) || isRouteRoad(road)) return;
        ctx.beginPath();
        road.points.forEach((point, index) => {
          const p = worldToScreen(point[0], point[1]);
          if (index === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.lineWidth = Math.max(1, 1.6 * Math.sqrt(view.scale));
        ctx.strokeStyle = "#7c3aed";
        ctx.globalAlpha = 0.64;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawRouteGraph() {
      ctx.save();
      const seen = new Set();
      routeLibrary.allEdges.forEach((edge) => {
        if (edge.synthetic) return;
        const key = [edge.from, edge.to, edge.roadId].sort().join("|");
        if (seen.has(key)) return;
        seen.add(key);
        const start = worldToScreen(edge.points[0][0], edge.points[0][1]);
        const end = worldToScreen(edge.points[1][0], edge.points[1][1]);
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.lineWidth = Math.max(0.9, (edge.rank >= 6 ? 1.9 : 1.2) * Math.sqrt(view.scale));
        ctx.strokeStyle = edge.rank >= 6 ? "#008080" : "#00a6a6";
        ctx.globalAlpha = edge.rank >= 6 ? 0.82 : 0.58;
        ctx.lineCap = "round";
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawNearMisses() {
      const diagnostics = routeLibrary.graph.diagnostics;
      ctx.save();
      diagnostics.deadEndsNearVisualRoad.forEach((item) => {
        const p = worldToScreen(item.x, item.y);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(5, 6 * Math.sqrt(view.scale)), 0, Math.PI * 2);
        ctx.strokeStyle = "#fb923c";
        ctx.lineWidth = Math.max(1.4, 1.6 * Math.sqrt(view.scale));
        ctx.globalAlpha = 0.88;
        ctx.stroke();
      });
      diagnostics.excludedVisualEndpoints.forEach((item) => {
        const p = worldToScreen(item.x, item.y);
        const size = Math.max(3, 4 * Math.sqrt(view.scale));
        ctx.fillStyle = "#0ea5e9";
        ctx.globalAlpha = 0.7;
        ctx.fillRect(p.x - size / 2, p.y - size / 2, size, size);
      });
      ctx.restore();
    }

    function drawConnectors() {
      ctx.save();
      const seen = new Set();
      routeLibrary.allEdges.forEach((edge) => {
        if (!edge.synthetic) return;
        const key = [edge.from, edge.to].sort().join("|");
        if (seen.has(key)) return;
        seen.add(key);
        const start = routeLibrary.graph.nodes.get(edge.from);
        const end = routeLibrary.graph.nodes.get(edge.to);
        if (!start || !end) return;
        const a = worldToScreen(start.x, start.y);
        const b = worldToScreen(end.x, end.y);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        const edgeId = String(edge.id);
        ctx.setLineDash(edgeId.includes("escape:") ? [8, 4] : [4, 4]);
        ctx.lineWidth = Math.max(1.4, 1.8 * Math.sqrt(view.scale));
        ctx.strokeStyle = edgeId.includes("escape:") ? "#d946ef" : "#f28c28";
        ctx.globalAlpha = 0.85;
        ctx.stroke();
        ctx.setLineDash([]);
      });
      ctx.restore();
    }

    function drawDeadEnds() {
      ctx.save();
      routeLibrary.graph.nodes.forEach((node, nodeId) => {
        const degree = (routeLibrary.graph.adjacency.get(nodeId) || []).length;
        if (degree > 1) return;
        const p = worldToScreen(node.x, node.y);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(2.4, 3.2 * Math.sqrt(view.scale)), 0, Math.PI * 2);
        ctx.fillStyle = "#f04444";
        ctx.globalAlpha = 0.9;
        ctx.fill();
      });
      ctx.restore();
    }

    function drawSmallComponents() {
      const threshold = trafficComponentThreshold(routeLibrary.graph);
      ctx.save();
      routeLibrary.graph.nodes.forEach((node) => {
        if ((node.componentSize || 0) >= threshold) return;
        const p = worldToScreen(node.x, node.y);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(1.8, 2.4 * Math.sqrt(view.scale)), 0, Math.PI * 2);
        ctx.fillStyle = "#6b5cff";
        ctx.globalAlpha = 0.55;
        ctx.fill();
      });
      ctx.restore();
    }

    function drawTrails() {
      ctx.save();
      vehicles.forEach((vehicle) => {
        if (!vehicle.trail || vehicle.trail.length < 2) return;
        ctx.beginPath();
        vehicle.trail.forEach((point, index) => {
          const p = worldToScreen(point.x, point.y);
          if (index === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.lineWidth = vehicle.id === selectedVehicleId ? 2.2 : 1.1;
        ctx.strokeStyle = vehicle.loopSuspect ? "#ff4d4d" : vehicle.id === selectedVehicleId ? "#2f6fed" : "#2aa876";
        ctx.globalAlpha = vehicle.id === selectedVehicleId ? 0.72 : 0.22;
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawPlans() {
      ctx.save();
      vehicles.forEach((vehicle) => {
        if (!vehicle.plannedEdges || !vehicle.plannedEdges.length) return;
        if (vehicle.id !== selectedVehicleId && !vehicle.loopSuspect) return;
        ctx.beginPath();
        const start = worldToScreen(vehicle.position.x, vehicle.position.y);
        ctx.moveTo(start.x, start.y);
        vehicle.plannedEdges.slice(0, 36).forEach((edge) => {
          const end = worldToScreen(edge.points[1][0], edge.points[1][1]);
          ctx.lineTo(end.x, end.y);
        });
        ctx.setLineDash([7, 5]);
        ctx.lineWidth = vehicle.id === selectedVehicleId ? 2 : 1.4;
        ctx.strokeStyle = vehicle.loopSuspect ? "#e03b3b" : "#2474f2";
        ctx.globalAlpha = vehicle.id === selectedVehicleId ? 0.84 : 0.38;
        ctx.stroke();
        ctx.setLineDash([]);
      });
      ctx.restore();
    }

    function drawVehicles() {
      ctx.save();
      vehicles.forEach((vehicle) => {
        const p = worldToScreen(vehicle.position.x, vehicle.position.y);
        const angle = Math.atan2(vehicle.currentEdge ? vehicle.currentEdge.vector.y : 0, vehicle.currentEdge ? vehicle.currentEdge.vector.x : 1);
        const size = vehicle.id === selectedVehicleId ? 7 : 5;
        const color = vehicle.loopSuspect ? "#e03b3b" : vehicle.lastDecision === "planned" || vehicle.lastDecision === "new-plan" || vehicle.lastDecision === "target-local" ? "#1e9b55" : vehicle.lastDecision === "escape" ? "#c026d3" : vehicle.lastDecision === "local" ? "#d39219" : "#64748b";
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(size + 2, 0);
        ctx.lineTo(-size, -size * 0.68);
        ctx.lineTo(-size * 0.45, 0);
        ctx.lineTo(-size, size * 0.68);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.strokeStyle = vehicle.id === selectedVehicleId ? "#ffffff" : "#12151b";
        ctx.lineWidth = vehicle.id === selectedVehicleId ? 2 : 1;
        ctx.fill();
        ctx.stroke();
        ctx.rotate(-angle);
        ctx.translate(-p.x, -p.y);
        if (vehicle.loopSuspect) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
          ctx.strokeStyle = "#e03b3b";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      });
      ctx.restore();
    }

      }).join("");

      if (selected) {

    function statHtml(value, label) {
      return "<div class=\"stat\"><b>" + value + "</b><span>" + label + "</span></div>";
    }

    function decisionLabel(value) {
      return ({ planned: "规划", "new-plan": "新规划", "target-local": "目标", local: "局部", escape: "短逃逸", dead: "死路", respawn: "重生", initial: "初始" })[value] || "巡航";
    }

    function selectNearestVehicle(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const sx = clientX - rect.left;
      const sy = clientY - rect.top;
      let best = null;
      let bestDistance = Infinity;
      vehicles.forEach((vehicle) => {
        const p = worldToScreen(vehicle.position.x, vehicle.position.y);
        const d = Math.hypot(p.x - sx, p.y - sy);
        if (d < bestDistance) {
          bestDistance = d;
          best = vehicle;
        }
      });
      if (best && bestDistance < 18) selectedVehicleId = best.id;
      render();
      updateSidebar();
    }

    function createRouteLibrary() {
      selectionEl.textContent = "初始化: hydrate 路由图";
      const graph = buildRoadGraph();
      selectionEl.textContent = "初始化: 收集种子点";
      const seedNodes = collectRouteSeedNodes(graph);
      selectionEl.textContent = "初始化: 收集目标点";
      const targetNodes = collectRouteTargetNodes(graph, seedNodes);
      const boundaryNodes = collectBoundaryRouteNodes(graph);
      const driveCoreNodes = collectDriveCoreNodes(graph);
      return { graph, seedNodes, targetNodes, boundaryNodes, driveCoreNodes, driveCoreNodeSet: new Set(driveCoreNodes), allEdges: graph.allEdges };
    }

    function buildRoadGraph() {
      if (window.TrafficGraph) {
        const graph = window.TRAFFIC_ROUTE_GRAPH
          ? window.TrafficGraph.hydrateRoadGraph(window.TRAFFIC_ROUTE_GRAPH)
          : window.TrafficGraph.buildRoadGraph(appData, {
            mode: "vehicle-core",
            connectors: false
          });
        graph.diagnostics = buildGraphDiagnostics(graph);
        return graph;
      }

      const nodes = new Map();
      const adjacency = new Map();
      const allEdges = [];
      let edgeCount = 0;
      const routeRoads = appData.roads.filter((road) => road.routable !== false && road.points.length > 1);
      function nodeKey(point, road, pointIndex) {
        const osmNodeId = road.nodeIds ? road.nodeIds[pointIndex] : null;
        if (osmNodeId !== null && osmNodeId !== undefined) {
          return "osm:" + osmNodeId;
        }
        return "coord:" + Math.round(point[0] / 2) + ":" + Math.round(point[1] / 2);
      }
      function ensureNode(point, road, pointIndex) {
        const key = nodeKey(point, road, pointIndex);
        if (!nodes.has(key)) {
          const osmNodeId = road.nodeIds ? road.nodeIds[pointIndex] : null;
          nodes.set(key, {
            id: key,
            x: point[0],
            y: point[1],
            osmNodeId,
            officialOsmNode: typeof osmNodeId === "number",
            layer: road.layer || 0,
            roads: new Set()
          });
          adjacency.set(key, []);
        }
        return key;
      }
      routeRoads.forEach((road) => {
        for (let index = 0; index < road.points.length - 1; index += 1) {
          const start = road.points[index];
          const end = road.points[index + 1];
          const length = distance(start, end);
          if (length < 0.5) continue;
          const from = ensureNode(start, road, index);
          const to = ensureNode(end, road, index + 1);
          nodes.get(from).roads.add(road.id);
          nodes.get(to).roads.add(road.id);
          const edgeId = road.id + ":" + index;
          const directions = roadDirections(road);
          if (directions.forward) {
            const forward = createTrafficEdge(edgeId + ":f", road, from, to, start, end, length);
            adjacency.get(from).push(forward);
            allEdges.push(forward);
          }
          if (directions.backward) {
            const backward = createTrafficEdge(edgeId + ":b", road, to, from, end, start, length);
            adjacency.get(to).push(backward);
            allEdges.push(backward);
          }
          edgeCount += 1;
        }
      });
      const connectorCount = 0;
      const componentStats = annotateTrafficComponents(nodes, adjacency);
      const coreStats = annotateTrafficCore(nodes, adjacency);
      const diagnostics = buildGraphDiagnostics(nodes, adjacency);
      return { nodes, adjacency, allEdges, diagnostics, edgeCount, connectorCount, componentCount: componentStats.count, largestComponentNodeCount: componentStats.largestNodeCount, coreNodeCount: coreStats.coreNodeCount, deadEndBranchNodeCount: coreStats.deadEndBranchNodeCount, routeRoadCount: routeRoads.length };
    }

    function createTrafficEdge(edgeId, road, from, to, start, end, length) {
      return { id: edgeId, roadId: road.id, from, to, rank: road.rank, highway: road.highway || "residential", synthetic: Boolean(road.synthetic), layer: road.layer || 0, bridge: Boolean(road.bridge), tunnel: Boolean(road.tunnel), length, points: [start, end], vector: { x: end[0] - start[0], y: end[1] - start[1] } };
    }

    function roadDirections(road) {
      if (road.oneway === "reverse") return { forward: false, backward: true };
      if (road.oneway === "yes") return { forward: true, backward: false };
      return { forward: true, backward: true };
    }

    function addNearbyTrafficConnectors(nodes, adjacency, allEdges) {
      const looseGap = 1.5;
      const tightGap = 0.4;
      const cellSize = looseGap;
      const buckets = new Map();
      const connectorUse = new Map();
      const candidates = [];
      const neighbors = buildTrafficNeighborMap(nodes, adjacency);
      function bucketKey(x, y) {
        return Math.floor(x / cellSize) + ":" + Math.floor(y / cellSize);
      }
      nodes.forEach((node) => {
        const key = bucketKey(node.x, node.y);
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(node);
      });
      nodes.forEach((node) => {
        const cellX = Math.floor(node.x / cellSize);
        const cellY = Math.floor(node.y / cellSize);
        for (let dx = -1; dx <= 1; dx += 1) {
          for (let dy = -1; dy <= 1; dy += 1) {
            const bucket = buckets.get((cellX + dx) + ":" + (cellY + dy)) || [];
            bucket.forEach((other) => {
              if (node.id >= other.id || hasTrafficConnection(adjacency, node.id, other.id)) return;
              if ((node.layer || 0) !== (other.layer || 0)) return;
              if (shareTrafficRoad(node, other) || neighbors.get(node.id).has(other.id)) return;
              const firstDegree = neighbors.get(node.id).size;
              const secondDegree = neighbors.get(other.id).size;
              const gap = distance(node, other);
              const allowedGap = firstDegree <= 1 || secondDegree <= 1 ? looseGap : tightGap;
              if (gap > allowedGap) return;
              const firstProfile = dominantNodeRoadProfile(adjacency, node.id);
              const secondProfile = dominantNodeRoadProfile(adjacency, other.id);
              candidates.push({ from: node, to: other, length: gap, rank: Math.max(2, Math.round((firstProfile.rank + secondProfile.rank) / 2)), highway: betterRoadClass(firstProfile.highway, secondProfile.highway) });
            });
          }
        }
      });
      candidates.sort((a, b) => a.length - b.length);
      let added = 0;
      candidates.forEach((candidate) => {
        const fromCount = connectorUse.get(candidate.from.id) || 0;
        const toCount = connectorUse.get(candidate.to.id) || 0;
        if (fromCount >= 1 || toCount >= 1 || hasTrafficConnection(adjacency, candidate.from.id, candidate.to.id)) return;
        const road = { id: "connector:" + candidate.from.id + ":" + candidate.to.id, rank: candidate.rank, highway: candidate.highway, layer: candidate.from.layer || 0, synthetic: true };
        const start = [candidate.from.x, candidate.from.y];
        const end = [candidate.to.x, candidate.to.y];
        const forward = createTrafficEdge(road.id + ":f", road, candidate.from.id, candidate.to.id, start, end, candidate.length);
        const backward = createTrafficEdge(road.id + ":b", road, candidate.to.id, candidate.from.id, end, start, candidate.length);
        adjacency.get(candidate.from.id).push(forward);
        adjacency.get(candidate.to.id).push(backward);
        allEdges.push(forward, backward);
        connectorUse.set(candidate.from.id, fromCount + 1);
        connectorUse.set(candidate.to.id, toCount + 1);
        added += 1;
      });
      return added;
    }

    function shareTrafficRoad(firstNode, secondNode) {
      if (!firstNode.roads || !secondNode.roads) return false;
      for (const roadId of firstNode.roads) {
        if (secondNode.roads.has(roadId)) return true;
      }
      return false;
    }

    function buildTrafficNeighborMap(nodes, adjacency) {
      const neighbors = new Map();
      nodes.forEach((node, nodeId) => {
        neighbors.set(nodeId, new Set());
      });
      adjacency.forEach((edges, nodeId) => {
        edges.forEach((edge) => {
          if (!nodes.has(edge.to)) return;
          neighbors.get(nodeId).add(edge.to);
          neighbors.get(edge.to).add(nodeId);
        });
      });
      return neighbors;
    }

    function annotateTrafficComponents(nodes, adjacency) {
      const neighbors = buildTrafficNeighborMap(nodes, adjacency);

      let componentId = 0;
      let largestNodeCount = 0;
      nodes.forEach((node, nodeId) => {
        if (node.componentId !== undefined) return;
        const queue = [nodeId];
        const componentNodes = [];
        let queueIndex = 0;
        node.componentId = componentId;
        while (queueIndex < queue.length) {
          const currentId = queue[queueIndex];
          queueIndex += 1;
          const current = nodes.get(currentId);
          if (!current) continue;
          componentNodes.push(currentId);
          (neighbors.get(currentId) || []).forEach((nextId) => {
            const nextNode = nodes.get(nextId);
            if (!nextNode || nextNode.componentId !== undefined) return;
            nextNode.componentId = componentId;
            queue.push(nextId);
          });
        }
        largestNodeCount = Math.max(largestNodeCount, componentNodes.length);
        componentNodes.forEach((currentId) => {
          const current = nodes.get(currentId);
          if (current) current.componentSize = componentNodes.length;
        });
        componentId += 1;
      });
      return { count: componentId, largestNodeCount };
    }

    function annotateTrafficCore(nodes, adjacency) {
      const neighbors = buildTrafficNeighborMap(nodes, adjacency);
      const degree = new Map();
      const queue = [];
      neighbors.forEach((linkedNodes, nodeId) => {
        degree.set(nodeId, linkedNodes.size);
        if (linkedNodes.size <= 1) queue.push(nodeId);
      });
      const removed = new Set();
      let queueIndex = 0;
      while (queueIndex < queue.length) {
        const nodeId = queue[queueIndex];
        queueIndex += 1;
        if (removed.has(nodeId) || (degree.get(nodeId) || 0) > 1) continue;
        removed.add(nodeId);
        (neighbors.get(nodeId) || []).forEach((neighborId) => {
          if (removed.has(neighborId)) return;
          const nextDegree = (degree.get(neighborId) || 0) - 1;
          degree.set(neighborId, nextDegree);
          if (nextDegree <= 1) queue.push(neighborId);
        });
      }
      let coreNodeCount = 0;
      nodes.forEach((node, nodeId) => {
        node.isTrafficCore = !removed.has(nodeId);
        if (node.isTrafficCore) coreNodeCount += 1;
      });
      return { coreNodeCount, deadEndBranchNodeCount: removed.size };
    }

    function buildGraphDiagnostics(graphOrNodes, adjacency) {
      const nodes = graphOrNodes.nodes || graphOrNodes;
      adjacency = graphOrNodes.adjacency || adjacency;
      if (graphOrNodes.precomputed) {
        return { deadEndsNearVisualRoad: [], excludedVisualEndpoints: [] };
      }
      const drawnRoads = appData.roads.filter(isDrawnRoad);
      const graphNodes = [...nodes.values()];
      const segmentBuckets = buildRoadSegmentBuckets(drawnRoads, 18);
      const nodeBuckets = buildNodeBuckets(graphNodes, 4);
      const neighbors = buildTrafficNeighborMap(nodes, adjacency);
      const deadEndsNearVisualRoad = [];
      const excludedVisualEndpoints = [];

      graphNodes.forEach((node) => {
        const degree = (neighbors.get(node.id) || new Set()).size;
        if (degree > 1) return;
        const nearest = findNearestNonIncidentRoad(node, segmentBuckets, 18);
        if (nearest && nearest.distance <= 2) {
          deadEndsNearVisualRoad.push({
            x: node.x,
            y: node.y,
            nodeId: node.id,
            componentSize: node.componentSize,
            roadName: nearest.road.name || nearest.road.id,
            distance: nearest.distance
          });
        }
      });

      drawnRoads.forEach((road) => {
        if (isRouteRoad(road)) return;
        [road.points[0], road.points[road.points.length - 1]].forEach((point) => {
          if (hasNearbyGraphNode(nodeBuckets, point, 1.6, 4)) return;
          excludedVisualEndpoints.push({
            x: point[0],
            y: point[1],
            roadId: road.id,
            roadName: road.name || road.id,
            highway: road.highway,
            length: road.length
          });
        });
      });

      return { deadEndsNearVisualRoad, excludedVisualEndpoints };
    }

    function buildRoadSegmentBuckets(roads, cellSize) {
      const buckets = new Map();
      roads.forEach((road) => {
        for (let index = 0; index < road.points.length - 1; index += 1) {
          const start = road.points[index];
          const end = road.points[index + 1];
          const minX = Math.floor(Math.min(start[0], end[0]) / cellSize);
          const maxX = Math.floor(Math.max(start[0], end[0]) / cellSize);
          const minY = Math.floor(Math.min(start[1], end[1]) / cellSize);
          const maxY = Math.floor(Math.max(start[1], end[1]) / cellSize);
          const segment = { road, start, end };
          for (let x = minX; x <= maxX; x += 1) {
            for (let y = minY; y <= maxY; y += 1) {
              const key = x + ":" + y;
              if (!buckets.has(key)) buckets.set(key, []);
              buckets.get(key).push(segment);
            }
          }
        }
      });
      return buckets;
    }

    function buildNodeBuckets(nodes, cellSize) {
      const buckets = new Map();
      nodes.forEach((node) => {
        const key = Math.floor(node.x / cellSize) + ":" + Math.floor(node.y / cellSize);
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(node);
      });
      return buckets;
    }

    function findNearestNonIncidentRoad(node, segmentBuckets, cellSize) {
      let best = null;
      const cellX = Math.floor(node.x / cellSize);
      const cellY = Math.floor(node.y / cellSize);
      for (let dx = -1; dx <= 1; dx += 1) {
        for (let dy = -1; dy <= 1; dy += 1) {
          const segments = segmentBuckets.get((cellX + dx) + ":" + (cellY + dy)) || [];
          segments.forEach((segment) => {
            if (node.roads && node.roads.has(segment.road.id)) return;
            const value = pointToSegmentDistance(node, segment.start, segment.end);
          if (!best || value < best.distance) {
              best = { distance: value, road: segment.road };
          }
          });
        }
      }
      return best;
    }

    function hasNearbyGraphNode(nodeBuckets, point, threshold, cellSize) {
      const cellX = Math.floor(point[0] / cellSize);
      const cellY = Math.floor(point[1] / cellSize);
      for (let dx = -1; dx <= 1; dx += 1) {
        for (let dy = -1; dy <= 1; dy += 1) {
          const nodes = nodeBuckets.get((cellX + dx) + ":" + (cellY + dy)) || [];
          if (nodes.some((node) => distance(point, node) <= threshold)) return true;
        }
      }
      return false;
    }

    function isDrawnRoad(road) {
      return road.rank >= 2 && road.points.length > 1;
    }

    function isRouteRoad(road) {
      return road.routable !== false && road.points.length > 1;
    }

    function hasTrafficConnection(adjacency, from, to) {
      return (adjacency.get(from) || []).some((edge) => edge.to === to);
    }

    function dominantNodeRoadProfile(adjacency, nodeId) {
      const edges = adjacency.get(nodeId) || [];
      if (!edges.length) return { rank: 2, highway: "residential" };
      return edges.reduce((best, edge) => edge.rank > best.rank ? edge : best, edges[0]);
    }

    function betterRoadClass(first, second) {
      const order = ["residential", "unclassified", "tertiary", "secondary", "primary", "trunk", "motorway"];
      return order.indexOf(first) >= order.indexOf(second) ? first : second;
    }

    function trafficComponentThreshold(graph) {
      return Math.max(24, Math.floor((graph.largestComponentNodeCount || graph.nodes.size) * 0.035));
    }

    function isUsableTrafficNode(graph, nodeId) {
      const node = graph.nodes.get(nodeId);
      return Boolean(node && node.isTrafficCore && (node.componentSize || 0) >= trafficComponentThreshold(graph));
    }

    function filterUsableTrafficNodes(graph, nodeIds) {
      const usableNodes = nodeIds.filter((nodeId) => isUsableTrafficNode(graph, nodeId));
      return usableNodes.length ? usableNodes : nodeIds;
    }

    function collectRouteSeedNodes(graph) {
      const seeds = [];
      routeTemplates.forEach((segments) => {
        const road = roadLookup.get(segments[0]);
        if (!road || road.points.length < 2) return;
        [road.points[0], road.points[Math.floor(road.points.length / 2)], road.points[road.points.length - 1]].forEach((point) => {
          const closest = findClosestGraphNode(graph, point);
          if (closest && !seeds.includes(closest)) seeds.push(closest);
        });
      });
      appData.roads.filter((road) => road.rank >= 6 && road.length > 80).sort((a, b) => b.length - a.length).slice(0, 24).forEach((road) => {
        const closest = findClosestGraphNode(graph, road.points[Math.floor(road.points.length / 2)]);
        if (closest && !seeds.includes(closest)) seeds.push(closest);
      });
      appData.roads.filter((road) => road.rank >= 2 && road.rank <= 3 && road.length > 55).sort((a, b) => b.length - a.length).slice(0, 36).forEach((road) => {
        const closest = findClosestGraphNode(graph, road.points[Math.floor(road.points.length / 2)]);
        if (closest && !seeds.includes(closest)) seeds.push(closest);
      });
      if (!seeds.length) seeds.push(...graph.nodes.keys());
      return filterUsableTrafficNodes(graph, seeds);
    }

    function collectRouteTargetNodes(graph, seedNodes) {
      const targets = [];
      const targetSet = new Set();
      graph.adjacency.forEach((edges, nodeId) => {
        if (!graph.nodes.has(nodeId) || !isUsableTrafficNode(graph, nodeId)) return;
        const realEdges = edges.filter((edge) => !edge.synthetic);
        const hasMainRoad = realEdges.some((edge) => edge.rank >= 6);
        const hasChoice = realEdges.length >= 3;
        if (hasChoice && (hasMainRoad || edges.length >= 4) && !targetSet.has(nodeId)) {
          targetSet.add(nodeId);
          targets.push(nodeId);
        }
      });
      seedNodes.forEach((nodeId) => {
        if (!isUsableTrafficNode(graph, nodeId)) return;
        const realEdges = (graph.adjacency.get(nodeId) || []).filter((edge) => !edge.synthetic);
        if (realEdges.length >= 3 && !targetSet.has(nodeId)) {

          targets.push(nodeId);
        }
      });
      return targets.length ? targets : filterUsableTrafficNodes(graph, [...graph.nodes.keys()]);
    }

    function collectBoundaryRouteNodes(graph) {
      const nodes = [];
      const nodeSet = new Set();
      const threshold = 24;
      graph.nodes.forEach((node, nodeId) => {
        if (!isUsableTrafficNode(graph, nodeId)) return;
        if (node.boundaryClip && nodeRoadRank(graph, nodeId) >= 5) {
          nodeSet.add(nodeId);
          nodes.push(nodeId);
          return;
        }
        const nearBoundary = node.x <= roadBounds.minX + threshold
          || node.x >= roadBounds.maxX - threshold
          || node.y <= roadBounds.minY + threshold
          || node.y >= roadBounds.maxY - threshold;
        if (nearBoundary && nodeRoadRank(graph, nodeId) >= 5 && !nodeSet.has(nodeId)) nodes.push(nodeId);
      });
      return nodes;
    }

    function collectDriveCoreNodes(graph) {
      const outCount = new Map();
      const reverse = new Map();
      graph.nodes.forEach((node, nodeId) => {
        outCount.set(nodeId, 0);
        reverse.set(nodeId, []);
      });
      graph.adjacency.forEach((edges, from) => {
        edges.forEach((edge) => {
          if (!isTrafficSyntheticTraversable(edge)) return;
          outCount.set(from, (outCount.get(from) || 0) + 1);
          if (reverse.has(edge.to)) reverse.get(edge.to).push(from);
        });
      });
      const removed = new Set();
      const queue = [];
      outCount.forEach((count, nodeId) => {
        if (count <= 0) queue.push(nodeId);
      });
      while (queue.length) {
        const nodeId = queue.shift();
        if (removed.has(nodeId)) continue;
        removed.add(nodeId);
        (reverse.get(nodeId) || []).forEach((previousNode) => {
          if (removed.has(previousNode)) return;
          const nextCount = (outCount.get(previousNode) || 0) - 1;
          outCount.set(previousNode, nextCount);
          if (nextCount <= 0) queue.push(previousNode);
        });
      }
      const core = [];
      graph.nodes.forEach((node, nodeId) => {
        if (!removed.has(nodeId) && isUsableTrafficNode(graph, nodeId)) core.push(nodeId);
      });
      return core;
    }

    function findClosestGraphNode(graph, point) {
      let best = null;
      let bestDistance = Infinity;
      graph.nodes.forEach((node, key) => {
        const value = distance(point, node);
        if (value < bestDistance) {
          bestDistance = value;
          best = key;
        }
      });
      return best;
    }

    function vehicleStrategy(index) {
      if (index % 5 === 0) return "through";
      if (index % 3 === 0) return "local";
      return "arterial";
    }

    function nodeRoadRank(graph, nodeId) {
      const edges = graph.adjacency.get(nodeId) || [];
      if (!edges.length) return 1;
      return edges.reduce((rank, edge) => Math.max(rank, edge.rank || 1), 1);
    }

    function targetDistanceForStrategy(strategy, componentSize) {
      if ((componentSize || 0) < 180) return strategy === "local" ? 120 : 180;
      if (strategy === "through") return 560;
      if (strategy === "arterial") return 340;
      return 170;
    }

    function createVehicles() {
      const list = [];
      const graph = routeLibrary.graph;
      const count = appData.metrics && appData.metrics.totalVehicles ? appData.metrics.totalVehicles : 28;
      for (let index = 0; index < count; index += 1) {
        const seedNode = routeLibrary.seedNodes[index % routeLibrary.seedNodes.length];
        const currentEdge = chooseInitialTrafficEdge(graph, seedNode, index);
        const edgeProgress = currentEdge ? ((index * 137) % 1000) / 1000 * currentEdge.length : 0;
        const fallbackNode = graph.nodes.get(seedNode) || { x: SCENE_WIDTH / 2, y: SCENE_HEIGHT / 2 };
        const position = currentEdge ? sampleEdge(currentEdge, edgeProgress) : { x: fallbackNode.x, y: fallbackNode.y };
        const personality = 0.9 + (index % 6) * 0.045;

        const vehicle = {
          id: "V-" + String(index + 1).padStart(3, "0"),

          previousEdgeId: currentEdge ? currentEdge.id : null,
          recentEdges: currentEdge ? [currentEdge.id] : [],
          recentNodes: currentEdge ? [currentEdge.from, currentEdge.to] : [seedNode],
          plannedEdges: [],

    function chooseInitialTrafficEdge(graph, seedNode, salt) {
      const initialEdges = graph.adjacency.get(seedNode) || [];
      let candidates = preferRealTrafficEdges(filterDeadEndCandidates(graph, initialEdges));
      if (!candidates.length) {
        const fallback = Array.from(graph.adjacency.entries()).find((entry) => isUsableTrafficNode(graph, entry[0]) && filterDeadEndCandidates(graph, entry[1]).length);
        candidates = fallback ? preferRealTrafficEdges(filterDeadEndCandidates(graph, fallback[1])) : [];
      }
      if (!candidates.length) {
        candidates = routeLibrary.allEdges.filter((edge) => !edge.synthetic
          && edge.rank >= 6
          && isUsableTrafficNode(graph, edge.from)
          && isDriveCoreNode(graph, edge.from)
          && isDriveCoreNode(graph, edge.to)
          && hasImmediateForwardExit(graph, edge));
      }
      if (!candidates.length) return null;
      return weightedChoice(candidates.map((edge, index) => ({
        item: edge,
        weight: roadPreference(edge) * (edge.synthetic ? 0.08 : 1) * (0.82 + (((salt + 5) * (index + 13)) % 19) / 30)
