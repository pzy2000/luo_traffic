    }

    function advanceVehicle(vehicle, dt, timestamp, index) {
      if (!vehicle.currentEdge) {
        if (controls.deadEndRespawn.checked) respawnVehicle(vehicle, timestamp, "deadEndRespawn");
        return;
      }
      maybeStartTrafficSlowdown(vehicle, timestamp);
      let speed = getVehicleCruiseSpeed(vehicle.currentEdge, vehicle.personality);
      if (timestamp < vehicle.turnSlowdownUntil) speed *= vehicle.turnSlowFactor;
      if (timestamp < vehicle.slowUntil) speed *= vehicle.slowFactor;
      if (timestamp < vehicle.stopUntil && !isElevatedOrExpressway(vehicle.currentEdge)) speed = 0;
      vehicle.speed = speed;
      let remaining = speed * dt;
      let guard = 0;
      while (remaining > 0 && guard < 14 && vehicle.currentEdge) {
        guard += 1;
        const edgeRemaining = Math.max(0, vehicle.currentEdge.length - vehicle.edgeProgress);
        if (remaining < edgeRemaining) {
          vehicle.edgeProgress += remaining;
          remaining = 0;
          break;
        }
        remaining -= edgeRemaining;
        vehicle.edgeProgress = vehicle.currentEdge.length;
        const incomingEdge = vehicle.currentEdge;
        const arrivalNode = incomingEdge.to;
        if (controls.boundaryRespawn.checked && timestamp > vehicle.spawnGraceUntil && isBoundaryNode(arrivalNode) && !isBoundaryNode(incomingEdge.from)) {
          respawnVehicle(vehicle, timestamp, "boundaryRespawn");
          remaining = 0;
          break;
        }
        const nextEdge = chooseNextTrafficEdge(routeLibrary.graph, arrivalNode, vehicle, incomingEdge, index + guard, timestamp);
        if (!nextEdge) {
          vehicle.lastDecision = "dead";
          issueCounts.deadEnd += 1;
          logEvent("dead-end", vehicle.id + " 到达无可用出口节点 " + arrivalNode, timestamp);
          respawnVehicle(vehicle, timestamp, isBoundaryDeadEndNode(routeLibrary.graph, arrivalNode, incomingEdge) ? "boundaryRespawn" : "deadEndRespawn");
          vehicle.speed = 0;
          remaining = 0;
          break;
        }
        const alignment = vectorAlignment(incomingEdge.vector, nextEdge.vector);
        if (nextEdge.to === incomingEdge.from || alignment < -0.55) {
          vehicle.uturns += 1;
          issueCounts.uturn += 1;
          logEvent("u-turn", vehicle.id + " 急回头 alignment=" + alignment.toFixed(2), timestamp);
        }
        vehicle.previousNode = incomingEdge.from;
        vehicle.previousEdgeId = incomingEdge.id;
        vehicle.currentEdge = nextEdge;
        vehicle.edgeProgress = 0;
        rememberVehiclePath(vehicle, nextEdge);
        updateTurnSlowdown(vehicle, alignment, timestamp);
        maybeStopAtIntersection(vehicle, arrivalNode, incomingEdge, nextEdge, alignment, timestamp);
        if (timestamp < vehicle.stopUntil) {
          remaining = 0;
        }
      }
      vehicle.position = sampleEdge(vehicle.currentEdge, vehicle.edgeProgress);
      vehicle.trail.push({ x: vehicle.position.x, y: vehicle.position.y });
      if (vehicle.trail.length > 520) vehicle.trail.shift();
    }

    function chooseNextTrafficEdge(graph, nodeId, vehicle, incomingEdge, salt, timestamp) {
      const outgoing = graph.adjacency.get(nodeId) || [];
      if (!outgoing.length) return null;
      const legalOutgoing = outgoing.filter((edge) => isLegalTrafficTransition(graph, incomingEdge, edge));
      if (!legalOutgoing.length) return null;
      const previousNode = incomingEdge.from;
      if (!vehicle.targetNode || isVehicleTargetReached(graph, nodeId, vehicle)) {
        assignVehicleTarget(graph, nodeId, vehicle, salt);
      }
      const plannedEdge = takePlannedTrafficEdge(graph, nodeId, vehicle, incomingEdge);
      if (plannedEdge) {
        vehicle.lastDecision = "planned";
        return plannedEdge;
      }
      let candidates = legalOutgoing.filter((edge) => edge.to !== previousNode && vectorAlignment(incomingEdge.vector, edge.vector) > -0.18);
      if (!candidates.length) candidates = legalOutgoing.filter((edge) => edge.to !== previousNode && vectorAlignment(incomingEdge.vector, edge.vector) > -0.48);
      if (!candidates.length) candidates = legalOutgoing.filter((edge) => edge.to !== previousNode && vectorAlignment(incomingEdge.vector, edge.vector) > -0.82);
      if (!candidates.length) {
        const escapeEdge = graph.precomputed ? null : createShortEscapeEdge(graph, nodeId, incomingEdge, previousNode);
        if (escapeEdge) {
          vehicle.lastDecision = "escape";
          vehicle.escapes += 1;
          issueCounts.escape += 1;
          logEvent("escape", vehicle.id + " 使用临时短逃逸边 " + nodeId + " -> " + escapeEdge.to, timestamp);
          return escapeEdge;
        }
      }
      if (!candidates.length) return null;
      const cruiseCandidates = candidates.filter((edge) => isCruiseTrafficEdge(graph, edge));
      if (cruiseCandidates.length) candidates = cruiseCandidates;
      const forwardCandidates = filterDeadEndCandidates(graph, candidates);
      if (forwardCandidates.length) candidates = forwardCandidates;
      else {
        const safeOutgoing = filterDeadEndCandidates(graph, legalOutgoing)
          .filter((edge) => edge.to !== previousNode || legalOutgoing.length === 1);
        if (safeOutgoing.length) candidates = safeOutgoing;
        else {
          const coreOutgoing = legalOutgoing.filter((edge) => edge.to !== previousNode
            && isDriveCoreNode(graph, edge.to)
            && isTrafficSyntheticTraversable(edge)
            && vectorAlignment(incomingEdge.vector, edge.vector) > -0.82);
          if (coreOutgoing.length) candidates = coreOutgoing;
          else return null;
        }
      }
      const plannedRoute = shouldPlanTrafficRoute(graph, nodeId, vehicle, candidates, timestamp)
        ? planTrafficRoute(graph, nodeId, vehicle, incomingEdge, salt)
        : [];
      if (plannedRoute.length) {
        vehicle.plannedEdges = plannedRoute;
        const routedEdge = takePlannedTrafficEdge(graph, nodeId, vehicle, incomingEdge);
        if (routedEdge) {
          vehicle.lastDecision = "new-plan";
          return routedEdge;
        }
      }
      vehicle.plannedEdges = [];
      candidates = preferRealTrafficEdges(candidates);
      vehicle.lastDecision = vehicle.targetNode ? "target-local" : "local";
      vehicle.localFallbacks += 1;
      const currentNode = graph.nodes.get(nodeId);
      const targetNode = graph.nodes.get(vehicle.targetNode);
      const currentTargetDistance = currentNode && targetNode ? distance(currentNode, targetNode) : 0;
      if (targetNode && currentTargetDistance < vehicle.bestTargetDistance) {
        vehicle.bestTargetDistance = currentTargetDistance;
      }
      return weightedChoice(candidates.map((edge, index) => {
        const alignment = vectorAlignment(incomingEdge.vector, edge.vector);
        const nextNode = graph.nodes.get(edge.to);
        const targetProgress = nextNode && targetNode ? currentTargetDistance - distance(nextNode, targetNode) : 0;
        let weight = roadPreference(edge);
        weight *= 0.7 + Math.max(0, alignment) * 1.9;
        weight *= rankTransitionPreference(incomingEdge, edge, alignment);
        weight *= targetProgressPreference(vehicle, edge, targetProgress);
        if (alignment < -0.55) weight *= 0.003;
        else if (alignment < -0.15) weight *= 0.045;
        else if (alignment < 0.25) weight *= 0.48;
        if (edge.roadId === incomingEdge.roadId && alignment > 0.35) weight *= incomingEdge.rank >= 6 ? 2.8 : 1.6;
        if (vehicle.recentEdges.includes(edge.id)) weight *= 0.035;
        if (vehicle.recentNodes.includes(edge.to)) weight *= 0.08;
        if (edge.synthetic) weight *= 0.16;
        weight *= 0.84 + rng() * 0.36 + (((salt + 7) * (index + 17)) % 11) / 80;
        return { item: edge, weight: Math.max(0.01, weight) };
      }));
    }

    function shouldPlanTrafficRoute(graph, nodeId, vehicle, candidates, timestamp) {
      if (vehicle.nextRoutePlanAt && timestamp < vehicle.nextRoutePlanAt) return false;
      if (candidates.length <= 1) return false;
      const now = performance.now();
      const minWallGap = graph.precomputed ? 110 : 45;
      if (now - lastRoutePlanWallAt < minWallGap) return false;
      lastRoutePlanWallAt = now;
      const strategyDelay = vehicle.strategy === "through" ? 5200 : vehicle.strategy === "arterial" ? 4200 : 3000;
      vehicle.nextRoutePlanAt = timestamp + strategyDelay + rng() * 1800;
      return true;
    }

    function createShortEscapeEdge(graph, nodeId, incomingEdge, previousNode) {
      const node = graph.nodes.get(nodeId);
      if (!node) return null;
      const maxGap = incomingEdge.rank >= 6 ? 15 : 12;
      let best = null;
      let bestScore = -Infinity;
      graph.nodes.forEach((candidate) => {
        if (candidate.id === nodeId || candidate.id === previousNode || hasTrafficConnection(graph.adjacency, nodeId, candidate.id)) return;
        const gap = distance(node, candidate);
        if (gap < 1.2 || gap > maxGap) return;
        const exits = (graph.adjacency.get(candidate.id) || []).filter((edge) => edge.to !== nodeId && edge.to !== previousNode);
        if (!exits.length) return;
        const bridgeVector = { x: candidate.x - node.x, y: candidate.y - node.y };
        const bridgeAlignment = vectorAlignment(incomingEdge.vector, bridgeVector);
        if (bridgeAlignment < -0.75) return;
        const bestExit = exits.reduce((bestEdge, edge) => {
          const edgeScore = vectorAlignment(incomingEdge.vector, edge.vector) + roadPreference(edge) * 0.28 - (edge.synthetic ? 0.8 : 0);
          const bestScoreValue = vectorAlignment(incomingEdge.vector, bestEdge.vector) + roadPreference(bestEdge) * 0.28 - (bestEdge.synthetic ? 0.8 : 0);
          return edgeScore > bestScoreValue ? edge : bestEdge;
        }, exits[0]);
        const exitAlignment = vectorAlignment(incomingEdge.vector, bestExit.vector);
        const score = roadPreference(bestExit) * 1.2 + Math.max(0, exitAlignment) * 3 + Math.max(0, bridgeAlignment) * 2 - gap * 0.8;
        if (score > bestScore) {
          best = { node: candidate, exit: bestExit, length: gap };
          bestScore = score;
        }
      });
      if (!best) return null;
      const road = { id: "escape:" + nodeId + ":" + best.node.id + ":" + incomingEdge.id, rank: Math.max(2, best.exit.rank), highway: best.exit.highway, synthetic: true };
      return createTrafficEdge(road.id + ":f", road, nodeId, best.node.id, [node.x, node.y], [best.node.x, best.node.y], best.length);
    }

    function takePlannedTrafficEdge(graph, nodeId, vehicle, incomingEdge) {
      while (vehicle.plannedEdges.length) {
        const edge = vehicle.plannedEdges.shift();
        if (edge.from !== nodeId || !hasTrafficConnection(graph.adjacency, edge.from, edge.to)) {
          vehicle.plannedEdges = [];
          return null;
        }
        if (graph.precomputed && (!isDriveCoreNode(graph, edge.to) || !hasImmediateForwardExit(graph, edge))) {
          vehicle.plannedEdges = [];
          return null;
        }
        if (!isLegalTrafficTransition(graph, incomingEdge, edge)) {
          vehicle.plannedEdges = [];
          return null;
        }
        const alignment = vectorAlignment(incomingEdge.vector, edge.vector);
        if (edge.to !== incomingEdge.from && alignment > -0.82) return edge;
        vehicle.plannedEdges = [];
        return null;
      }
      return null;
    }

    function assignVehicleTarget(graph, nodeId, vehicle, salt) {
      const targets = selectTrafficRouteTargets(graph, nodeId, vehicle, salt);
      if (!targets.length) {
        vehicle.targetNode = null;
        vehicle.targetPoint = null;
        vehicle.bestTargetDistance = Infinity;
        return null;
      }
      const targetId = targets[Math.floor(rng() * targets.length)] || targets[0];
      const targetNode = graph.nodes.get(targetId);
      if (!targetNode) return null;
      vehicle.targetNode = targetId;
      vehicle.targetPoint = { x: targetNode.x, y: targetNode.y };
      const currentNode = graph.nodes.get(nodeId);
      vehicle.bestTargetDistance = currentNode ? distance(currentNode, targetNode) : Infinity;
      return targetId;
    }

    function isVehicleTargetReached(graph, nodeId, vehicle) {
      const targetNode = graph.nodes.get(vehicle.targetNode);
      const currentNode = graph.nodes.get(nodeId);
      if (!targetNode || !currentNode) return true;
      const value = distance(currentNode, targetNode);
      if (value < (vehicle.strategy === "through" ? 130 : vehicle.strategy === "arterial" ? 90 : 65)) return true;
      if (vehicle.bestTargetDistance < Infinity && value > vehicle.bestTargetDistance + 260 && vehicle.localFallbacks % 18 === 0) return true;
      return false;
    }

    function targetProgressPreference(vehicle, edge, progress) {
      let weight = 1;
      if (progress > 60) weight *= 3.1;
      else if (progress > 25) weight *= 2.2;
      else if (progress > 5) weight *= 1.45;
      else if (progress < -90) weight *= 0.2;
      else if (progress < -35) weight *= 0.42;
      else if (progress < -8) weight *= 0.72;

      if (vehicle.strategy === "through") {
        if (edge.rank >= 7) weight *= 2.6;
        else if (edge.rank >= 5) weight *= 1.5;
        else if (edge.rank <= 3) weight *= 0.28;
      } else if (vehicle.strategy === "arterial") {
        if (edge.rank >= 6) weight *= 1.8;
        else if (edge.rank <= 3) weight *= 0.55;
      } else if (edge.rank <= 4) {
        weight *= 1.25;
      }
      return weight;
    }

    function planTrafficRoute(graph, nodeId, vehicle, incomingEdge, salt) {
      const targets = selectTrafficRouteTargets(graph, nodeId, vehicle, salt);
      if (!targets.length) return [];
      const route = findTrafficPath(graph, nodeId, new Set(targets), vehicle, incomingEdge);
      if (route.length) vehicle.tripCount += 1;
      return route;
    }

    function selectTrafficRouteTargets(graph, nodeId, vehicle, salt) {
      const startNode = graph.nodes.get(nodeId);
      if (!startNode) return [];
      const strategy = vehicle.strategy || "arterial";
      const primaryPool = strategy === "through" && routeLibrary.boundaryNodes.length
        ? routeLibrary.boundaryNodes
        : routeLibrary.targetNodes;
      const routeTargets = primaryPool.length ? primaryPool : [...graph.nodes.keys()];
      let pool = routeTargets.filter((targetId) => {
        const targetNode = graph.nodes.get(targetId);
        return targetNode && targetNode.componentId === startNode.componentId && isUsableTrafficNode(graph, targetId) && isDriveCoreNode(graph, targetId);
      });
      if (!pool.length && strategy === "through") {
        pool = routeLibrary.targetNodes.filter((targetId) => {
          const targetNode = graph.nodes.get(targetId);
          return targetNode && targetNode.componentId === startNode.componentId && isUsableTrafficNode(graph, targetId) && isDriveCoreNode(graph, targetId);
        });
      }
      if (!pool.length) {
        pool = [...graph.nodes.keys()].filter((targetId) => {
          const targetNode = graph.nodes.get(targetId);
          return targetNode && targetNode.componentId === startNode.componentId && isUsableTrafficNode(graph, targetId) && isDriveCoreNode(graph, targetId);
        });
      }
      if (!pool.length) return [];
      const minTargetDistance = targetDistanceForStrategy(strategy, startNode.componentSize);
      const candidates = pool.map((targetId) => {
        const targetNode = graph.nodes.get(targetId);
        if (!targetNode || targetId === nodeId || vehicle.recentNodes.includes(targetId)) return null;
        const targetDistance = distance(startNode, targetNode);
        const rank = nodeRoadRank(graph, targetId);
        let weight = 1 + Math.max(0, rank - 2) * 0.55;
        if (strategy === "through") {
          weight *= rank >= 7 ? 5.4 : rank >= 5 ? 2.2 : 0.35;
          weight *= routeLibrary.boundaryNodes.includes(targetId) ? 3.8 : 1;
        } else if (strategy === "arterial") {
          weight *= rank >= 6 ? 4.2 : rank >= 5 ? 2.4 : rank <= 3 ? 0.35 : 1;
        } else {
          weight *= rank <= 4 ? 2.2 : 0.85;
        }
        weight *= clamp(targetDistance / Math.max(160, minTargetDistance), 0.35, 3.2);
        return { id: targetId, distance: targetDistance, weight };
      }).filter(Boolean);
      const distantTargets = candidates.filter((target) => target.distance >= minTargetDistance);
      const selectedTargets = distantTargets.length ? distantTargets : candidates;
      const targetCount = strategy === "through" ? 48 : strategy === "arterial" ? 36 : 24;
      return pickWeightedTargetIds(selectedTargets, targetCount, salt);
    }

    function pickWeightedTargetIds(targets, count, salt) {
      const selected = [];
      const available = targets.slice();
      while (available.length && selected.length < count) {
        const choice = weightedChoice(available.map((target, index) => ({
          item: target,
          weight: target.weight * (0.82 + rng() * 0.35 + (((salt + 11) * (index + 5)) % 13) / 70)
        })));
        if (!choice) break;
        selected.push(choice.id);
        const index = available.findIndex((target) => target.id === choice.id);
        if (index >= 0) available.splice(index, 1);
      }
      return selected;
    }

    function findTrafficPath(graph, startNodeId, targetNodes, vehicle, incomingEdge) {
      const strategy = vehicle.strategy || "arterial";
      const minTravelDistance = strategy === "through" ? 520 : strategy === "arterial" ? 300 : 150;
      const maxTravelDistance = strategy === "through" ? 2700 : strategy === "arterial" ? 1850 : 980;
      const maxIterations = strategy === "through" ? 4800 : strategy === "arterial" ? 3600 : 1900;
      const startRecord = { nodeId: startNodeId, previousNode: incomingEdge.from, previousVector: incomingEdge.vector, previousEdge: incomingEdge, edge: null, parent: null, cost: 0, distance: 0 };
      const heap = [startRecord];
      const bestCost = new Map([[trafficStateKey(startRecord.nodeId, startRecord.previousNode), 0]]);
      let iterations = 0;
      while (heap.length && iterations < maxIterations) {
        iterations += 1;
        const record = popTrafficHeap(heap);
        const recordKey = trafficStateKey(record.nodeId, record.previousNode);
        if (record.cost > ((bestCost.get(recordKey) ?? Infinity) + 0.001)) continue;
        if (targetNodes.has(record.nodeId) && record.distance >= minTravelDistance) return reconstructTrafficPath(record);
        const outgoing = graph.adjacency.get(record.nodeId) || [];
        outgoing.forEach((edge) => {
          if (edge.to === record.previousNode || !isTrafficSyntheticTraversable(edge)) return;
          if (!isLegalTrafficTransition(graph, record.previousEdge, edge)) return;
          if (graph.precomputed && (!isDriveCoreNode(graph, edge.to) || !hasImmediateForwardExit(graph, edge))) return;
          const alignment = vectorAlignment(record.previousVector, edge.vector);
          if (alignment <= -0.82) return;
          const nextDistance = record.distance + edge.length;
          if (nextDistance > maxTravelDistance) return;
          const recentPenalty = vehicle.recentNodes.includes(edge.to) ? 90 : 0;
          const nextCost = record.cost + trafficEdgeCost(edge, record.previousEdge, alignment) + recentPenalty;
          const nextKey = trafficStateKey(edge.to, record.nodeId);
          if (nextCost >= (bestCost.get(nextKey) ?? Infinity)) return;
          const nextRecord = { nodeId: edge.to, previousNode: record.nodeId, previousVector: edge.vector, previousEdge: edge, edge, parent: record, cost: nextCost, distance: nextDistance };
          bestCost.set(nextKey, nextCost);
          pushTrafficHeap(heap, nextRecord);
        });
      }
      return [];
    }

    function trafficStateKey(nodeId, previousNodeId) {
      return nodeId + "|" + previousNodeId;
    }

    function trafficEdgeCost(edge, previousEdge, alignment) {
      let cost = edge.length / Math.max(0.8, roadPreference(edge) * 0.42);
      if (alignment < -0.1) cost += 58;
      else if (alignment < 0.35) cost += 26;
      else if (alignment < 0.72) cost += 8;
      else cost -= 3;
      if (previousEdge && edge.roadId === previousEdge.roadId && alignment > 0.35) cost *= 0.72;
      if (edge.rank >= 7) cost *= 0.78;
      else if (edge.rank <= 3) cost *= 1.42;
      if (edge.synthetic) cost += edge.syntheticKind === "short-extension" ? 42 : 120;
      return Math.max(1, cost);
    }

    function reconstructTrafficPath(record) {
      const path = [];
      let cursor = record;
      while (cursor && cursor.edge) {
        path.push(cursor.edge);
        cursor = cursor.parent;
      }
      return path.reverse();
    }

    function pushTrafficHeap(heap, record) {
      heap.push(record);
      let index = heap.length - 1;
      while (index > 0) {
        const parentIndex = Math.floor((index - 1) / 2);
        if (heap[parentIndex].cost <= record.cost) break;
        heap[index] = heap[parentIndex];
        index = parentIndex;
      }
      heap[index] = record;
    }

    function popTrafficHeap(heap) {
      const first = heap[0];
      const last = heap.pop();
      if (heap.length && last) {
        let index = 0;
        while (true) {
          const leftIndex = index * 2 + 1;
          const rightIndex = leftIndex + 1;
          if (leftIndex >= heap.length) break;
          const smallerIndex = rightIndex < heap.length && heap[rightIndex].cost < heap[leftIndex].cost ? rightIndex : leftIndex;
          if (heap[smallerIndex].cost >= last.cost) break;
          heap[index] = heap[smallerIndex];
          index = smallerIndex;
        }
        heap[index] = last;
      }
      return first;
    }

    function filterDeadEndCandidates(graph, candidates) {
      if (graph.precomputed) {
        return candidates.filter((edge) => isCruiseTrafficEdge(graph, edge)
          && isDriveCoreNode(graph, edge.to)
          && isTrafficSyntheticTraversable(edge)
          && hasImmediateForwardExit(graph, edge));
      }
      return candidates.filter((edge) => isCruiseTrafficEdge(graph, edge) && hasForwardPathAfterEdge(graph, edge));
    }

    function isDriveCoreNode(graph, nodeId) {
      if (!graph.precomputed || !routeLibrary || !routeLibrary.driveCoreNodeSet) return true;
      return routeLibrary.driveCoreNodeSet.has(nodeId);
    }

    function hasCachedForwardPathAfterEdge(graph, edge) {
      const cacheKey = edge.id + "|" + edge.to;
      if (forwardPathCache.has(cacheKey)) return forwardPathCache.get(cacheKey);
      const value = hasForwardPathAfterEdge(graph, edge);
      forwardPathCache.set(cacheKey, value);
      return value;
    }

    function preferRealTrafficEdges(candidates) {
      const realEdges = candidates.filter((edge) => !edge.synthetic);
      return realEdges.length ? realEdges : candidates;
    }

    function isCruiseTrafficEdge(graph, edge) {
      const targetNode = graph.nodes.get(edge.to);
      return Boolean(targetNode && targetNode.isTrafficCore && isUsableTrafficNode(graph, edge.to));
    }

    function hasForwardPathAfterEdge(graph, edge) {
      const targetDistance = edge.rank <= 3 ? 70 : edge.rank >= 6 ? 150 : 110;
      const minDisplacement = edge.rank <= 3 ? 45 : edge.rank >= 6 ? 85 : 65;
      const originNode = graph.nodes.get(edge.from);
      const stack = [{ nodeId: edge.to, previousNode: edge.from, previousVector: edge.vector, previousEdge: edge, distance: 0, depth: 0, visited: new Set([edge.id]) }];
      while (stack.length) {
        const state = stack.pop();
        const exits = (graph.adjacency.get(state.nodeId) || []).filter((nextEdge) => nextEdge.to !== state.previousNode
          && !state.visited.has(nextEdge.id)
          && isLegalTrafficTransition(graph, state.previousEdge, nextEdge)
          && vectorAlignment(state.previousVector, nextEdge.vector) > -0.82);
        for (const nextEdge of exits) {
          if (!isTrafficSyntheticTraversable(nextEdge)) continue;
          const nextDistance = state.distance + nextEdge.length;
          const nextDepth = state.depth + 1;
          if (nextDistance >= targetDistance) {
            const exitNode = graph.nodes.get(nextEdge.to);
            if (!originNode || !exitNode || distance(originNode, exitNode) >= minDisplacement) return true;
          }
          if (nextDepth >= 14) continue;
          const visited = new Set(state.visited);
          visited.add(nextEdge.id);
          stack.push({ nodeId: nextEdge.to, previousNode: nextEdge.from, previousVector: nextEdge.vector, previousEdge: nextEdge, distance: nextDistance, depth: nextDepth, visited });
        }
      }
      return false;
    }

    function hasImmediateForwardExit(graph, edge) {
      return (graph.adjacency.get(edge.to) || [])
        .some((nextEdge) => nextEdge.to !== edge.from
          && isLegalTrafficTransition(graph, edge, nextEdge)
          && vectorAlignment(edge.vector, nextEdge.vector) > -0.82
          && isTrafficSyntheticTraversable(nextEdge));
    }

    function isTrafficSyntheticTraversable(edge) {
      if (!edge.synthetic) return true;
      if (edge.syntheticKind === "short-extension") return edge.length <= (edge.rank >= 6 ? 18 : 8);
      if (edge.syntheticKind === "repair-connector") return edge.length <= 2.5;
      if (edge.syntheticKind === "short-junction") return edge.length <= 3.2;
      return edge.length <= 4.2;
    }

    function isLegalTrafficTransition(graph, incomingEdge, nextEdge) {
      if (!nextEdge || !isTrafficSyntheticTraversable(nextEdge)) return false;
      if (!graph.nodes.has(nextEdge.to)) return false;
      if (!incomingEdge) return true;
      if (!isTrafficSyntheticTraversable(incomingEdge)) return false;
      const alignment = vectorAlignment(incomingEdge.vector, nextEdge.vector);
      if (nextEdge.to === incomingEdge.from || alignment < -0.55) return false;
      const sameRoad = nextEdge.roadId === incomingEdge.roadId;
      const incomingLink = isLinkEdge(incomingEdge);
      const nextLink = isLinkEdge(nextEdge);
      const incomingSeparated = isGradeSeparatedEdge(incomingEdge);
      const nextSeparated = isGradeSeparatedEdge(nextEdge);
      const gradeChanges = edgeGradeSignature(incomingEdge) !== edgeGradeSignature(nextEdge);

      if (incomingSeparated && gradeChanges && !incomingLink && !nextLink) {
        const straightContinuation = alignment > 0.86 && (sameRoad || nextEdge.rank >= incomingEdge.rank - 1);
        if (!straightContinuation) return false;
      }
      if (isElevatedMainline(incomingEdge) && !nextLink) {
        if (!nextSeparated && nextEdge.rank <= 5 && !sameRoad) return false;
        if (alignment < 0.52 && !sameRoad && nextEdge.rank < incomingEdge.rank) return false;
      }
      if (incomingEdge.rank >= 8 && !incomingLink && !nextLink && nextEdge.rank <= 5 && !sameRoad) return false;
      if (incomingEdge.rank >= 7 && !nextLink && nextEdge.rank <= 4 && alignment < 0.82 && !sameRoad) return false;
      if (incomingSeparated && !nextSeparated && !incomingLink && !nextLink && nextEdge.rank < incomingEdge.rank && alignment < 0.86 && !sameRoad) return false;
      return true;
    }

    function isLinkEdge(edge) {
      return Boolean(edge && /_link$/.test(edge.highway || ""));
    }

    function isGradeSeparatedEdge(edge) {
      return Boolean(edge && (edge.bridge || edge.tunnel || (edge.layer || 0) !== 0));
    }

    function edgeGradeSignature(edge) {
      if (!edge) return "none";
      return `${edge.layer || 0}:${edge.bridge ? 1 : 0}:${edge.tunnel ? 1 : 0}`;
    }

    function isElevatedMainline(edge) {
      return Boolean(edge
        && !isLinkEdge(edge)
        && !edge.tunnel
        && (edge.rank >= 8 || edge.bridge || (edge.layer || 0) > 0));
    }

    function rankTransitionPreference(incomingEdge, nextEdge, alignment) {
      const rankDelta = nextEdge.rank - incomingEdge.rank;
      let weight = 1;
      if (incomingEdge.rank >= 7) {
        if (nextEdge.rank >= incomingEdge.rank - 1 && alignment > 0.25) weight *= 3.4;
        else if (nextEdge.rank <= 3) weight *= 0.1;
        else if (rankDelta <= -3) weight *= 0.28;
        else if (rankDelta < 0) weight *= 0.62;
      } else if (incomingEdge.rank >= 5) {
        if (nextEdge.rank >= incomingEdge.rank && alignment > 0.25) weight *= 2.2;
        else if (nextEdge.rank <= 3) weight *= 0.34;
        else if (rankDelta < 0) weight *= 0.72;
      } else if (incomingEdge.rank <= 3) {
        if (nextEdge.rank >= 6) weight *= 5.2;
        else if (nextEdge.rank >= 4) weight *= 2.8;
        else if (nextEdge.rank <= 3) weight *= alignment > 0.55 ? 0.78 : 0.46;
      }
      if (nextEdge.highway.includes("link")) weight *= incomingEdge.rank >= 6 ? 0.62 : 1.45;
      return weight;
    }

    function rememberVehiclePath(vehicle, edge) {
      vehicle.recentEdges.push(edge.id);
      if (vehicle.recentEdges.length > 24) vehicle.recentEdges.shift();
      vehicle.recentNodes.push(edge.to);
      if (vehicle.recentNodes.length > 30) vehicle.recentNodes.shift();
    }

    function updateVehicleDiagnostics(vehicle, timestamp) {
      vehicle.samples.push({ x: vehicle.position.x, y: vehicle.position.y, t: timestamp, edge: vehicle.currentEdge ? vehicle.currentEdge.id : "" });
      while (vehicle.samples.length && timestamp - vehicle.samples[0].t > 26000) vehicle.samples.shift();
      if (vehicle.samples.length < 40) return;
      let minX = Infinity;
      let maxX = -Infinity;
      let minY = Infinity;
      let maxY = -Infinity;
      const cells = new Set();
      const edges = new Set();
      vehicle.samples.forEach((sample) => {
        minX = Math.min(minX, sample.x);
        maxX = Math.max(maxX, sample.x);
        minY = Math.min(minY, sample.y);
        maxY = Math.max(maxY, sample.y);
        cells.add(Math.floor(sample.x / 42) + ":" + Math.floor(sample.y / 42));
        if (sample.edge) edges.add(sample.edge);
      });
      const width = maxX - minX;
      const height = maxY - minY;
      const compact = (cells.size <= 5 && edges.size > 18) || (width < 130 && height < 130 && edges.size > 22);
      vehicle.diagnostics = { width, height, cells: cells.size, uniqueEdges: edges.size };
      if (compact && !vehicle.loopSuspect && timestamp - vehicle.lastLoopEvent > 5000) {
        vehicle.loopSuspect = true;
        vehicle.lastLoopEvent = timestamp;
        issueCounts.loop += 1;
        logEvent("small-loop", vehicle.id + " 在 " + Math.round(width) + "x" + Math.round(height) + " 范围内经过 " + edges.size + " 条边", timestamp);
        respawnVehicle(vehicle, timestamp, "loopRespawn");
      } else if (!compact && vehicle.loopSuspect && width > 190 && height > 190) {
        vehicle.loopSuspect = false;
      }
    }

    function respawnVehicle(vehicle, timestamp, reason) {
      const edge = chooseSpawnEdge(reason);
      if (!edge) return;
      vehicle.currentEdge = edge;
      vehicle.edgeProgress = rng() * Math.max(1, edge.length * 0.25);
      vehicle.previousNode = edge.from;
      vehicle.previousEdgeId = edge.id;
      vehicle.position = sampleEdge(edge, vehicle.edgeProgress);
      vehicle.recentEdges = [edge.id];
      vehicle.recentNodes = [edge.from, edge.to];
      vehicle.plannedEdges = [];
      vehicle.nextRoutePlanAt = timestamp + rng() * 900;
      vehicle.trail = [vehicle.position];
      vehicle.samples = [];
      vehicle.diagnostics = {};
      vehicle.loopSuspect = false;
      vehicle.lastDecision = "respawn";
      vehicle.respawns += 1;
      vehicle.spawnGraceUntil = timestamp + 4000;
      vehicle.stopUntil = 0;
      vehicle.slowUntil = 0;
      vehicle.slowFactor = 1;
      vehicle.turnSlowdownUntil = 0;
      vehicle.turnSlowFactor = 1;
      vehicle.consecutiveTurns = 0;
      vehicle.nextIncidentCheck = timestamp + 1800 + rng() * 3800;
      assignVehicleTarget(routeLibrary.graph, edge.to, vehicle, Math.floor(timestamp));
      if (reason === "boundaryRespawn") issueCounts.boundaryRespawn += 1;
      if (reason === "deadEndRespawn") issueCounts.deadEndRespawn += 1;
      if (reason === "loopRespawn") issueCounts.loopRespawn += 1;
      logEvent(reason, vehicle.id + " 从 " + (edge.highway || "road") + " 重新进入", timestamp);
    }

    function chooseSpawnEdge(reason) {
      let candidates = routeLibrary.allEdges.filter((edge) => {
        const from = routeLibrary.graph.nodes.get(edge.from);
        const to = routeLibrary.graph.nodes.get(edge.to);
        if (!from || !to || edge.synthetic) return false;
        if (!isUsableTrafficNode(routeLibrary.graph, edge.from)) return false;
        if (!isDriveCoreNode(routeLibrary.graph, edge.from) || !isDriveCoreNode(routeLibrary.graph, edge.to)) return false;
        if (reason === "boundaryRespawn" && !(isBoundaryNode(edge.from) || isBoundaryNode(edge.to))) return false;
        return edge.rank >= 6 && (routeLibrary.graph.precomputed ? hasImmediateForwardExit(routeLibrary.graph, edge) : hasForwardPathAfterEdge(routeLibrary.graph, edge));
      });
      if (!candidates.length) {
        candidates = routeLibrary.allEdges.filter((edge) => !edge.synthetic
          && edge.rank >= 7
          && isUsableTrafficNode(routeLibrary.graph, edge.from)
          && isDriveCoreNode(routeLibrary.graph, edge.from)
          && isDriveCoreNode(routeLibrary.graph, edge.to));
      }
      if (!candidates.length) {
        candidates = routeLibrary.allEdges.filter((edge) => !edge.synthetic
          && edge.rank >= 6
          && isUsableTrafficNode(routeLibrary.graph, edge.from)
          && isDriveCoreNode(routeLibrary.graph, edge.from)
          && isDriveCoreNode(routeLibrary.graph, edge.to));
      }
      if (!candidates.length) return null;
      return weightedChoice(candidates.map((edge) => ({ item: edge, weight: roadPreference(edge) * (edge.rank >= 7 ? 2 : 1) * Math.max(1, edge.length) })));
    }

    function isBoundaryNode(nodeId) {
      const node = routeLibrary.graph.nodes.get(nodeId);
      if (!node) return false;
      if (node.boundaryClip) return true;
      const threshold = 18;
      return node.x <= roadBounds.minX + threshold || node.x >= roadBounds.maxX - threshold || node.y <= roadBounds.minY + threshold || node.y >= roadBounds.maxY - threshold;
    }

    function isNearMapBoundary(point, threshold) {
      return point.x <= roadBounds.minX + threshold
        || point.x >= roadBounds.maxX - threshold
        || point.y <= roadBounds.minY + threshold
        || point.y >= roadBounds.maxY - threshold;
    }

    function nearestMapBoundary(point) {
      const candidates = [
        { side: "west", distance: Math.abs(point.x - roadBounds.minX), normal: { x: -1, y: 0 } },
        { side: "east", distance: Math.abs(roadBounds.maxX - point.x), normal: { x: 1, y: 0 } },
        { side: "north", distance: Math.abs(point.y - roadBounds.minY), normal: { x: 0, y: -1 } },
        { side: "south", distance: Math.abs(roadBounds.maxY - point.y), normal: { x: 0, y: 1 } }
      ];
      return candidates.reduce((best, item) => (item.distance < best.distance ? item : best), candidates[0]);
    }

    function isBoundaryDeadEndNode(graph, nodeId, incomingEdge) {
      const node = graph.nodes.get(nodeId);
      if (!node) return false;
      if (node.boundaryClip) return true;
      if (!incomingEdge || !isNearMapBoundary(node, 24)) return false;
      const boundary = nearestMapBoundary(node);
      return Boolean(boundary && vectorAlignment(incomingEdge.vector, boundary.normal) > 0.18);
    }

    function maybeStopAtIntersection(vehicle, nodeId, incomingEdge, nextEdge, alignment, timestamp) {
      const degree = (routeLibrary.graph.adjacency.get(nodeId) || []).length;
      if (degree < 3 || timestamp < vehicle.stopUntil) return;
      if (isFreeFlowStraight(incomingEdge, nextEdge, alignment)) {
        vehicle.stopUntil = 0;
        return;
      }
      let stopChance = 0.035 + Math.min(0.12, Math.max(0, degree - 3) * 0.012);
      if (incomingEdge.rank <= 3 || nextEdge.rank <= 3) stopChance += 0.045;
      if (alignment < 0.45) stopChance += 0.045;
      if (incomingEdge.rank >= 7 && nextEdge.rank >= 7) stopChance *= 0.28;
      if (vehicle.strategy === "through") stopChance *= 0.45;
      if (rng() < stopChance) vehicle.stopUntil = timestamp + 240 + rng() * 980;
    }

    function isFreeFlowStraight(incomingEdge, nextEdge, alignment) {
      return isElevatedOrExpressway(incomingEdge)
        && isElevatedOrExpressway(nextEdge)
        && alignment > 0.58;
    }

    function isElevatedOrExpressway(edge) {
      return edge.rank >= 8
        || edge.highway === "motorway"
        || edge.highway === "trunk"
        || edge.highway === "motorway_link"
        || edge.highway === "trunk_link"
        || edge.bridge
        || edge.tunnel
        || (edge.layer || 0) > 0;
    }

    function updateTurnSlowdown(vehicle, alignment, timestamp) {
      if (alignment >= 0.86) {
        if (timestamp - vehicle.lastTurnTime > 1800) vehicle.consecutiveTurns = 0;
        return;
      }
      if (timestamp - vehicle.lastTurnTime < 2200) {
        vehicle.consecutiveTurns = Math.min(4, vehicle.consecutiveTurns + 1);
      } else {
        vehicle.consecutiveTurns = 1;
      }
      vehicle.lastTurnTime = timestamp;

      let baseFactor = 0.82;
      if (alignment < 0.2) baseFactor = 0.62;
      else if (alignment < 0.55) baseFactor = 0.76;
      else baseFactor = 0.9;
      const continuousPenalty = (vehicle.consecutiveTurns - 1) * 0.06;
      vehicle.turnSlowFactor = Math.max(0.5, baseFactor - continuousPenalty);
      vehicle.turnSlowdownUntil = Math.max(
        vehicle.turnSlowdownUntil,
        timestamp + 360 + vehicle.consecutiveTurns * 220 + rng() * 180
      );
    }

    function maybeStartTrafficSlowdown(vehicle, timestamp) {
      if (timestamp < vehicle.nextIncidentCheck || timestamp < vehicle.slowUntil) return;
      vehicle.nextIncidentCheck = timestamp + 2400 + rng() * 5600;
      const edge = vehicle.currentEdge;
      let chance = 0.018;
      if (edge.rank <= 3) chance += 0.018;
      else if (edge.rank >= 7) chance *= 0.55;
      if (rng() < chance) {
        vehicle.slowUntil = timestamp + 1800 + rng() * 5200;
        vehicle.slowFactor = 0.22 + rng() * 0.42;
      } else {
        vehicle.slowFactor = 1;
      }
    }

    function getVehicleCruiseSpeed(edge, personality) {
      const speeds = { motorway: 152, trunk: 132, primary: 112, motorway_link: 92, trunk_link: 88, primary_link: 82, secondary: 88, secondary_link: 74, tertiary: 72, tertiary_link: 62, unclassified: 58, residential: 46 };
      return (speeds[edge.highway] || 54) * personality;
    }

    function roadPreference(edge) {
      const weights = { motorway: 8.2, trunk: 6.8, primary: 5.3, motorway_link: 4.2, trunk_link: 4, primary_link: 3.6, secondary: 3.8, secondary_link: 2.9, tertiary: 2.5, tertiary_link: 2.1, unclassified: 1.55, residential: 1 };
      return weights[edge.highway] || Math.max(0.8, edge.rank * 0.48);
    }

    function weightedChoice(weightedItems) {
      const total = weightedItems.reduce((sum, entry) => sum + entry.weight, 0);
      if (!weightedItems.length || total <= 0) return null;
      let cursor = rng() * total;
      for (const entry of weightedItems) {
        cursor -= entry.weight;
        if (cursor <= 0) return entry.item;
      }
      return weightedItems[weightedItems.length - 1].item;
    }

    function sampleEdge(edge, progress) {
      if (!edge) return { x: SCENE_WIDTH / 2, y: SCENE_HEIGHT / 2 };
      const ratio = clamp(progress / (edge.length || 1), 0, 1);
      const start = edge.points[0];
      const end = edge.points[1];
      return { x: lerp(start[0], end[0], ratio), y: lerp(start[1], end[1], ratio) };
    }

    function vectorAlignment(first, second) {
      const left = Math.hypot(first.x, first.y) || 1;
      const right = Math.hypot(second.x, second.y) || 1;
      return (first.x * second.x + first.y * second.y) / (left * right);
    }

    function getRoadBounds(roads) {
      const bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
      roads.forEach((road) => {
        road.points.forEach((point) => {
          bounds.minX = Math.min(bounds.minX, point[0]);
          bounds.maxX = Math.max(bounds.maxX, point[0]);
          bounds.minY = Math.min(bounds.minY, point[1]);
          bounds.maxY = Math.max(bounds.maxY, point[1]);
        });
      });
      return bounds;
    }

    function worldToScreen(x, y) {
      return { x: x * view.scale + view.x, y: y * view.scale + view.y };
    }

    function screenToWorld(x, y) {
      return { x: (x - view.x) / view.scale, y: (y - view.y) / view.scale };
    }

    function distance(a, b) {
      const ax = Array.isArray(a) ? a[0] : a.x;
      const ay = Array.isArray(a) ? a[1] : a.y;
      const bx = Array.isArray(b) ? b[0] : b.x;
      const by = Array.isArray(b) ? b[1] : b.y;
      return Math.hypot(ax - bx, ay - by);
    }

    function pointToSegmentDistance(point, start, end) {
      const lengthSq = (end[0] - start[0]) ** 2 + (end[1] - start[1]) ** 2;
      if (!lengthSq) return distance(point, start);
      const t = clamp(
        ((point.x - start[0]) * (end[0] - start[0]) + (point.y - start[1]) * (end[1] - start[1])) / lengthSq,
        0,
        1
      );
      return Math.hypot(point.x - lerp(start[0], end[0], t), point.y - lerp(start[1], end[1], t));
    }

    function lerp(start, end, factor) {
      return start + (end - start) * factor;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function formatSeconds(value) {
      return (value / 1000).toFixed(1) + "s";
    }

    function logEvent(type, text, time) {
      eventLog.unshift({ type, text, time: time || simTime });
      if (eventLog.length > 120) eventLog.pop();
    }

    function createSeededRng(seed) {
      let value = seed % 2147483647;
      if (value <= 0) value += 2147483646;
      return function() {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483646;
      };
    }
  </script>
